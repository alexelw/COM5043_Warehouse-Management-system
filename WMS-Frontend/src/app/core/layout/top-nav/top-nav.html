<header class="top-nav surface">
  <div class="top-nav__brand">
    <a class="top-nav__brand-link" routerLink="/dashboard">
      <p class="eyebrow">Warehouse Management System</p>
      <h1>Operations Console</h1>
    </a>
    <p class="muted">Suppliers, stock, orders, and reporting in one place.</p>
  </div>

  <nav class="top-nav__links" aria-label="Primary">
    @for (item of navItems; track item.path) {
      <a
        class="top-nav__link"
        [routerLink]="item.path"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        {{ item.label }}
      </a>
    }
  </nav>

  <div class="top-nav__meta">
    <p class="muted">
      Working role:
      <strong>{{ selectedRole() }}</strong>
    </p>
    <app-role-selector />
  </div>
</header>
