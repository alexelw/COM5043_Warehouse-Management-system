<header class="top-nav surface">
  <div class="top-nav__brand">
    <a class="top-nav__brand-link" routerLink="/dashboard">
      <p class="eyebrow">BNU Industry Solutions</p>
      <h1>Warehouse</h1>
    </a>
  </div>

  <nav class="top-nav__links" aria-label="Primary">
    @for (item of visibleNavItems(); track item.path) {
      <a
        class="top-nav__link"
        [routerLink]="item.path"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: true }"
      >
        {{ item.label }}
      </a>
    }
  </nav>

  <div class="top-nav__meta">
    <p class="top-nav__role">{{ selectedRole() }}</p>
    <app-role-selector />
  </div>
</header>
