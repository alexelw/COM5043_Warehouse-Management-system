name: Backend CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore WMS-API/Wms.sln

      - name: Build
        run: dotnet build WMS-API/Wms.sln --no-restore -c Release

      - name: Test
        run: dotnet test WMS-API/Wms.sln --no-build -c Release
